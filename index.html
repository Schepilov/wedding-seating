// — Autocomplete input for guest name —
function AutocompleteInput({ inputRef, value, onChange, guestList, onSelectGuest, placeholder }) {
  const [open, setOpen] = useState(false);
  const [hi, setHi] = useState(0);

  const suggestions = useMemo(() => {
    if (!guestList || guestList.length === 0) return [];
    const q = (value || '').toLowerCase().trim();
    const filtered = q ? guestList.filter(g => g.name.toLowerCase().includes(q)) : guestList;
    return filtered.slice(0, 8);
  }, [value, guestList]);

  const select = (g) => { onSelectGuest(g); setOpen(false); };

  return (
    <div style={{ position: 'relative' }}>
      <input
        ref={inputRef}
        className="ws-input"
        type="text"
        value={value}
        onChange={e => { onChange(e.target.value); setOpen(true); setHi(0); }}
        onFocus={() => { setOpen(true); setHi(0); }}
        onBlur={() => setTimeout(() => setOpen(false), 150)}
        onKeyDown={e => {
          if (!open || suggestions.length === 0) return;
          if (e.key === 'ArrowDown') { e.preventDefault(); setHi(h => Math.min(h + 1, suggestions.length - 1)); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); setHi(h => Math.max(h - 1, 0)); }
          else if (e.key === 'Enter') { e.preventDefault(); select(suggestions[hi]); }
          else if (e.key === 'Escape') setOpen(false);
        }}
        placeholder={placeholder}
        autoComplete="off"
        data-1p-ignore
        data-lpignore="true"
        data-bwignore="true"
        data-form-type="other"
      />
      {open && suggestions.length > 0 && (
        <div className="ws-ac-dropdown">
          {suggestions.map((g, i) => (
            <div key={i} className={`ws-ac-item${i === hi ? ' is-hi' : ''}`}
              onMouseDown={e => { e.preventDefault(); select(g); }}
              onMouseEnter={() => setHi(i)}>
              <span style={{ fontSize: 13, fontWeight: 500, color: '#3A1828', flex: 1 }}>{g.name}</span>
              {g.role && <span style={{ fontSize: 11, color: '#9A6B7C', fontStyle: 'italic' }}>{g.role}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// — Парсинг CSV-текста в массив [{name, role}] —
function parseGuestCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return [];
  let start = 0;
  const firstLow = lines[0].toLowerCase();
  if (firstLow.includes('имя') || firstLow.includes('name') || firstLow.includes('фамили') || firstLow.includes('гость')) {
    start = 1;
  }
  const result = [];
  for (let i = start; i < lines.length; i++) {
    const parts = lines[i].split(/[,;|]/).map(s => s.trim().replace(/^"(.*)"$/s, '$1'));
    const name = parts[0];
    const role = parts[1] || '';
    if (name) result.push({ name, role });
  }
  return result;
}

// — Модалка управления списком гостей —
function GuestListModal({ guestList, onSave, onClose }) {
  const [list, setList] = useState(guestList.map(g => ({ ...g })));
  const [newName, setNewName] = useState('');
  const [newRole, setNewRole] = useState('');
  const [sheetUrl, setSheetUrl] = useState('');
  const [urlLoading, setUrlLoading] = useState(false);
  const [urlError, setUrlError] = useState('');
  const fileRef = useRef(null);
  const newNameRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const parsed = parseGuestCSV(ev.target.result);
      setList(prev => {
        const existing = new Set(prev.map(g => g.name.toLowerCase()));
        return [...prev, ...parsed.filter(g => !existing.has(g.name.toLowerCase()))];
      });
    };
    reader.readAsText(file, 'UTF-8');
    e.target.value = '';
  };

  const handleUrlLoad = async () => {
    const url = sheetUrl.trim();
    if (!url) return;
    setUrlLoading(true);
    setUrlError('');
    try {
      // Поддержка обычной ссылки на Google Sheets — конвертируем в export CSV
      let fetchUrl = url;
      const gSheetMatch = url.match(/\/spreadsheets\/d\/([^/]+)/);
      if (gSheetMatch && !url.includes('/pub?') && !url.includes('export?format')) {
        fetchUrl = `https://docs.google.com/spreadsheets/d/${gSheetMatch[1]}/export?format=csv`;
      }
      const resp = await fetch(fetchUrl);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      const parsed = parseGuestCSV(text);
      if (parsed.length === 0) throw new Error('Список пуст или формат не распознан');
      setList(prev => {
        const existing = new Set(prev.map(g => g.name.toLowerCase()));
        return [...prev, ...parsed.filter(g => !existing.has(g.name.toLowerCase()))];
      });
      setSheetUrl('');
    } catch (err) {
      setUrlError(err.message || 'Не удалось загрузить');
    }
    setUrlLoading(false);
  };

  const handleAdd = () => {
    const name = newName.trim();
    if (!name) return;
    setList(prev => [...prev, { name, role: newRole.trim() }]);
    setNewName('');
    setNewRole('');
    setTimeout(() => newNameRef.current && newNameRef.current.focus(), 30);
  };

  const handleRemove = (idx) => setList(prev => prev.filter((_, i) => i !== idx));

  return (
    <Modal onClose={onClose} wide>
      <h2 style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 26, fontWeight: 600,
        margin: '0 0 4px', color: '#3A1828' }}>Список гостей</h2>
      <p style={{ fontSize: 13, color: '#7B4D63', margin: '0 0 18px', lineHeight: 1.5 }}>
        Имена из списка будут доступны в автодополнении при заполнении мест.
      </p>

      {/* CSV file */}
      <div style={{ marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, color: '#7B4D63', textTransform: 'uppercase',
          letterSpacing: '0.1em', fontWeight: 600, marginBottom: 6 }}>Загрузить из CSV-файла</div>
        <input ref={fileRef} type="file" accept=".csv,.txt" style={{ display: 'none' }} onChange={handleFile} />
        <button className="ws-btn ws-btn-ghost" style={{ border: '1px dashed rgba(196,145,165,0.5)' }}
          onClick={() => fileRef.current.click()}>
          <Icon name="upload" size={13} /> Выбрать файл (.csv)
        </button>
        <span style={{ fontSize: 12, color: '#9A6B7C', marginLeft: 10 }}>
          Формат: <code style={{ background: 'rgba(232,173,192,0.2)', padding: '1px 4px', borderRadius: 3 }}>Имя Фамилия, Кто это</code>
        </span>
      </div>

      {/* Google Sheets URL */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontSize: 10.5, color: '#7B4D63', textTransform: 'uppercase',
          letterSpacing: '0.1em', fontWeight: 600, marginBottom: 6 }}>Загрузить из Google Sheets</div>
        <div style={{ display: 'flex', gap: 6 }}>
          <input className="ws-input" type="url" value={sheetUrl} onChange={e => setSheetUrl(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleUrlLoad()}
            placeholder="https://docs.google.com/spreadsheets/d/…"
            style={{ flex: 1, fontSize: 13 }} />
          <button className="ws-btn ws-btn-primary" onClick={handleUrlLoad}
            disabled={urlLoading || !sheetUrl.trim()} style={{ flexShrink: 0 }}>
            {urlLoading ? '…' : <><Icon name="link" size={13} /> Загрузить</>}
          </button>
        </div>
        {urlError && <div style={{ fontSize: 12, color: '#9C2E4F', marginTop: 5 }}>⚠ {urlError}</div>}
        <div style={{ fontSize: 11.5, color: '#9A6B7C', marginTop: 5, lineHeight: 1.4 }}>
          Таблица должна быть опубликована: Файл → Поделиться → Опубликовать в интернете → CSV.
          Первый столбец — имя, второй (необязательно) — кто это.
        </div>
      </div>

      {/* Manual add */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 10.5, color: '#7B4D63', textTransform: 'uppercase',
          letterSpacing: '0.1em', fontWeight: 600, marginBottom: 6 }}>Добавить вручную</div>
        <div style={{ display: 'flex', gap: 6 }}>
          <input ref={newNameRef} className="ws-input" type="text" value={newName}
            onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleAdd()}
            placeholder="Имя Фамилия" style={{ flex: 2, fontSize: 13 }} />
          <input className="ws-input" type="text" value={newRole}
            onChange={e => setNewRole(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleAdd()}
            placeholder="Кто это (необязательно)" style={{ flex: 2, fontSize: 13 }} />
          <button className="ws-btn ws-btn-primary" onClick={handleAdd}
            disabled={!newName.trim()} style={{ flexShrink: 0 }}>+ Добавить</button>
        </div>
      </div>

      {/* List */}
      <div style={{ border: '1px solid rgba(196,145,165,0.22)', borderRadius: 10,
        padding: '6px 12px', maxHeight: 240, overflowY: 'auto', marginBottom: 18,
        background: 'rgba(255,255,255,0.5)' }}>
        {list.length === 0 ? (
          <p style={{ textAlign: 'center', fontSize: 13, color: '#9A6B7C', padding: '16px 0', margin: 0 }}>
            Список пуст — загрузите CSV или добавьте гостей вручную
          </p>
        ) : (
          <>
            <div style={{ fontSize: 11, color: '#9A6B7C', padding: '4px 0 6px',
              borderBottom: '1px solid rgba(196,145,165,0.2)', marginBottom: 4,
              display: 'flex', gap: 8 }}>
              <span style={{ flex: 2 }}>Имя</span>
              <span style={{ flex: 2 }}>Кто это</span>
              <span style={{ width: 28 }}></span>
            </div>
            {list.map((g, i) => (
              <div key={i} className="ws-guestlist-row">
                <span style={{ flex: 2, fontSize: 13, color: '#3A1828', fontWeight: 500 }}>{g.name}</span>
                <span style={{ flex: 2, fontSize: 12, color: '#7B4D63', fontStyle: g.role ? 'normal' : 'italic' }}>
                  {g.role || '—'}
                </span>
                <button onClick={() => handleRemove(i)}
                  style={{ background: 'none', border: 'none', cursor: 'pointer',
                    color: '#C4748A', padding: '2px 4px', borderRadius: 4,
                    display: 'flex', alignItems: 'center', flexShrink: 0 }}>
                  <Icon name="trash" size={13} />
                </button>
              </div>
            ))}
            <div style={{ fontSize: 11.5, color: '#9A6B7C', textAlign: 'right',
              padding: '6px 0 2px' }}>{list.length} гостей</div>
          </>
        )}
      </div>

      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
        <button className="ws-btn ws-btn-ghost" onClick={onClose}>Отмена</button>
        <button className="ws-btn ws-btn-primary" onClick={() => { onSave(list); onClose(); }}>
          Сохранить список
        </button>
      </div>
    </Modal>
  );
}

  const [selectedSeat, setSelectedSeat] = useState(null);
  const [hoveredSeat, setHoveredSeat] = useState(null);
  const [seatPositions, setSeatPositions] = useState([]);
  const [jointPositions, setJointPositions] = useState([]);
  const [search, setSearch] = useState('');
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [showGuestList, setShowGuestList] = useState(false);
  const [bulkText, setBulkText] = useState('');
  const [saveStatus, setSaveStatus] = useState('idle');
  const [syncError, setSyncError] = useState(null);
  const saveTimerRef = useRef(null);
  const fromServerRef = useRef(false);
  const headerRef = useRef(null);

  useEffect(() => {
    const updateHeaderHeight = () => {
      if (!headerRef.current) return;
      document.documentElement.style.setProperty("--ws-header-height", headerRef.current.offsetHeight + "px");
    };
    updateHeaderHeight();
    window.addEventListener("resize", updateHeaderHeight);
    const ro = window.ResizeObserver ? new ResizeObserver(updateHeaderHeight) : null;
    if (ro && headerRef.current) ro.observe(headerRef.current);
    return () => {
      window.removeEventListener("resize", updateHeaderHeight);
      if (ro) ro.disconnect();
    };
  }, []);

  useEffect(() => {
    const docRef = window.__db.collection('seating').doc(DOC_ID);
    const unsubscribe = docRef.onSnapshot(
      (snap) => {
        if (snap.exists) {
          const data = snap.data();
          fromServerRef.current = true;
          setGuests(data.guests || {});
          setGuestList(data.guestList || []);
        } else {
          setGuests({});
          setGuestList([]);
        }
        setLoaded(true);
        setSyncError(null);
      },
      (err) => {
        console.error('Firestore error:', err);
        setSyncError(err.message || 'Ошибка соединения');
        setLoaded(true);
      }
    );
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (fromServerRef.current) {
      fromServerRef.current = false;
      return;
    }
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSaveStatus('saving');
    saveTimerRef.current = setTimeout(async () => {
      try {
        await window.__db.collection('seating').doc(DOC_ID).set({
          guests,
          guestList,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus((s) => (s === 'saved' ? 'idle' : s)), 1400);
      } catch (e) {
        console.error('Save error:', e);
        setSaveStatus('error');
      }
    }, 500);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [guests, guestList, loaded]);

  const handlePathRef = useCallback((node) => {
    if (!node) return;
    const totalLength = node.getTotalLength();
    const positions = [];
    const PERP = 64;
    const tangentAt = (length) => {
      const delta = 1;
      const a = node.getPointAtLength(Math.max(0, length - delta));
      const b = node.getPointAtLength(Math.min(totalLength, length + delta));
      const tx = b.x - a.x, ty = b.y - a.y;
      const len = Math.hypot(tx, ty) || 1;
      return { tx: tx / len, ty: ty / len };
    };
    for (let i = 0; i < INNER_SEATS; i++) {
      const t = (i + 0.5) / INNER_SEATS;
      const length = t * totalLength;
      const p = node.getPointAtLength(length);
      const { tx, ty } = tangentAt(length);
      positions.push({ number: i + 1, x: p.x + -ty * PERP, y: p.y + tx * PERP });
    }
    const outerCount = TOTAL_SEATS - INNER_SEATS;
    for (let i = 0; i < outerCount; i++) {
      const t = (i + 0.5) / outerCount;
      const length = (1 - t) * totalLength;
      const p = node.getPointAtLength(length);
      const { tx, ty } = tangentAt(length);
      positions.push({ number: INNER_SEATS + i + 1, x: p.x + ty * PERP, y: p.y + -tx * PERP });
    }
    setSeatPositions(positions);

    const HALF_TABLE = 37;
    const joints = JOINT_TS.map((t) => {
      const length = t * totalLength;
      const p = node.getPointAtLength(length);
      const { tx, ty } = tangentAt(length);
      return {
        x1: p.x + -ty * HALF_TABLE, y1: p.y + tx * HALF_TABLE,
        x2: p.x + ty * HALF_TABLE, y2: p.y + -tx * HALF_TABLE,
      };
    });
    setJointPositions(joints);
  }, []);

  const updateGuest = useCallback((seatNumber, field, value) => {
    setGuests((prev) => {
      const next = { ...prev };
      const cur = next[seatNumber] || { name: '', role: '', note: '' };
      const upd = { ...cur, [field]: value };
      if (!upd.name && !upd.role && !upd.note) delete next[seatNumber];
      else next[seatNumber] = upd;
      return next;
    });
  }, []);

  const clearSeat = useCallback((seatNumber) => {
    setGuests((prev) => { const next = { ...prev }; delete next[seatNumber]; return next; });
  }, []);

  const resetAll = useCallback(() => {
    setGuests({});
    setShowResetConfirm(false);
    setSelectedSeat(null);
  }, []);

  const handleBulkImport = useCallback(() => {
    const lines = bulkText.split('\n').map((l) => l.trim()).filter(Boolean);
    setGuests((prev) => {
      const next = { ...prev };
      lines.forEach((line, idx) => {
        const seatNum = idx + 1;
        if (seatNum > TOTAL_SEATS) return;
        const parts = line.split('|').map((s) => s.trim());
        const name = parts[0] || '';
        let role = '';
        let note = '';
        if (parts.length === 2) {
          note = parts[1];
        } else if (parts.length >= 3) {
          role = parts[1];
          note = parts.slice(2).join(' | ');
        }
        if (name || role || note) next[seatNum] = { name, role, note };
      });
      return next;
    });
    setBulkText('');
    setShowBulkImport(false);
  }, [bulkText]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') {
        if (showGuestList) setShowGuestList(false);
        else if (showBulkImport) setShowBulkImport(false);
        else if (showResetConfirm) setShowResetConfirm(false);
        else if (selectedSeat) setSelectedSeat(null);
      }
      if (selectedSeat && !showBulkImport && !showResetConfirm && !showGuestList) {
        const tag = (e.target && e.target.tagName) || '';
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          setSelectedSeat((s) => Math.max(1, (s || 1) - 1));
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          setSelectedSeat((s) => Math.min(TOTAL_SEATS, (s || 0) + 1));
        }
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [selectedSeat, showBulkImport, showResetConfirm, showGuestList]);

  function exportCSV() {
    const rows = [['№', 'ФИ гостя', 'Кто это', 'Примечание']];
    for (let i = 1; i <= TOTAL_SEATS; i++) {
      const g = guests[i] || {};
      rows.push([i, g.name || '', g.role || '', g.note || '']);
    }
    const csv = rows.map((r) => r.map((c) => {
      const s = String(c ?? '');
      if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes(';'))
        return '"' + s.replace(/"/g, '""') + '"';
      return s;
    }).join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `рассадка-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function exportXLSX() {
    const data = [['№', 'ФИ гостя', 'Кто это', 'Примечание']];
    for (let i = 1; i <= TOTAL_SEATS; i++) {
      const g = guests[i] || {};
      data.push([i, g.name || '', g.role || '', g.note || '']);
    }
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{ wch: 6 }, { wch: 36 }, { wch: 26 }, { wch: 36 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Рассадка');
    XLSX.writeFile(wb, `рассадка-${new Date().toISOString().slice(0, 10)}.xlsx`);
  }

  const filledCount = Object.keys(guests).filter((k) => guests[k] && guests[k].name && guests[k].name.trim()).length;

  const allSeats = useMemo(() => Array.from({ length: TOTAL_SEATS }, (_, i) => ({
    number: i + 1, ...(guests[i + 1] || { name: '', role: '', note: '' }),
  })), [guests]);

  const filteredSeats = useMemo(() => {
    if (!search.trim()) return allSeats;
    const q = search.toLowerCase().trim();
    return allSeats.filter((s) =>
      String(s.number).includes(q) ||
      s.name.toLowerCase().includes(q) ||
      (s.role || '').toLowerCase().includes(q) ||
      s.note.toLowerCase().includes(q));
  }, [search, allSeats]);

  const selectedGuest = selectedSeat ? guests[selectedSeat] || { name: '', role: '', note: '' } : null;

  return (
    <div style={{
      fontFamily: '"Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
      background: 'radial-gradient(ellipse at top, #FDF4ED 0%, #FAF6F1 40%, #F6EFE6 100%)',
      minHeight: '100vh', color: '#3A1828',
    }}>
      <style>{RESPONSIVE_CSS}</style>

      <header ref={headerRef} style={{
        background: '#FAF6F1', backdropFilter: 'blur(10px)',
        WebkitBackdropFilter: 'blur(10px)', borderBottom: '1px solid rgba(196, 145, 165, 0.2)',
        position: 'sticky', top: 0, zIndex: 30,
      }}>
        <div style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 220 }}>
            <h1 style={{
              fontFamily: '"Cormorant Garamond", "Times New Roman", serif',
              fontSize: 'clamp(22px, 3.4vw, 34px)', fontWeight: 600,
              letterSpacing: '0.01em', lineHeight: 1.05, color: '#3A1828', margin: 0,
            }}>Свадебная рассадка</h1>
            <p style={{ fontSize: 12.5, color: '#7B4D63', marginTop: 3,
              letterSpacing: '0.02em', margin: '3px 0 0 0', display: 'flex',
              alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
              <span><span style={{ fontWeight: 600, color: '#5C2A3E' }}>{filledCount}</span> из {TOTAL_SEATS} мест заполнено</span>
              {guestList.length > 0 && (
                <span style={{ color: '#9A6B7C' }}>· {guestList.length} в списке</span>
              )}
              {syncError ? (
                <span style={{ color: '#9C2E4F' }}>⚠ ошибка соединения</span>
              ) : saveStatus === 'saving' ? (
                <span style={{ fontStyle: 'italic', opacity: 0.6, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                  <Icon name="cloud" size={11} /> сохраняем…
                </span>
              ) : saveStatus === 'saved' ? (
                <span style={{ fontStyle: 'italic', opacity: 0.6, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                  <Icon name="cloud" size={11} /> ✓ синхронизировано
                </span>
              ) : null}
            </p>
          </div>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
            <button className="ws-btn ws-btn-ghost" onClick={() => setShowGuestList(true)}
              title="Управление списком гостей">
              <Icon name="list" /> Гости{guestList.length > 0 && <span style={{
                background: 'rgba(232,173,192,0.5)', borderRadius: 10,
                padding: '0 5px', fontSize: 11, fontWeight: 600,
              }}>{guestList.length}</span>}
            </button>
            <button className="ws-btn ws-btn-ghost" onClick={() => setShowBulkImport(true)}>
              <Icon name="upload" /> Импорт
            </button>
            <button className="ws-btn ws-btn-ghost" onClick={exportCSV}>
              <Icon name="download" /> CSV
            </button>
            <button className="ws-btn ws-btn-primary" onClick={exportXLSX}>
              <Icon name="sheet" /> Excel
            </button>
            <button className="ws-btn ws-btn-ghost" onClick={() => setShowResetConfirm(true)}
              title="Сбросить всё" style={{ padding: 8 }}>
              <Icon name="reset" />
            </button>
          </div>
        </div>
      </header>

      <main style={{ padding: '20px 20px 60px' }}>
        <div className="ws-grid">
          <aside className="ws-list-order">
            <div style={{ position: 'sticky', top: 90, background: 'rgba(255,255,255,0.55)',
              border: '1px solid rgba(196,145,165,0.22)', borderRadius: 14, padding: 12,
              maxHeight: 'calc(100vh - 110px)', display: 'flex', flexDirection: 'column',
              boxShadow: '0 1px 2px rgba(58,24,40,0.04)' }}>
              <div style={{ position: 'relative', marginBottom: 10 }}>
                <span style={{ position: 'absolute', left: 11, top: '50%',
                  transform: 'translateY(-50%)', color: '#9A6B7C', pointerEvents: 'none',
                  display: 'flex' }}>
                  <Icon name="search" />
                </span>
                <input className="ws-input" type="text" value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="Поиск по имени, роли или №"
                  style={{ paddingLeft: 32, fontSize: 13, padding: '9px 12px 9px 32px' }} />
              </div>
              <div style={{ overflowY: 'auto', flex: 1, marginRight: -4, paddingRight: 4 }}>
                {filteredSeats.map((seat) => {
                  const filled = !!(seat.name && seat.name.trim());
                  const isSelected = selectedSeat === seat.number;
                  return (
                    <button key={seat.number}
                      className={`ws-list-row ${isSelected ? 'is-selected' : ''}`}
                      onClick={() => setSelectedSeat(seat.number)}>
                      <span style={{ display: 'inline-flex', alignItems: 'center',
                        justifyContent: 'center', width: 26, height: 26, borderRadius: '50%',
                        fontSize: 11, fontWeight: 600, flexShrink: 0,
                        background: filled ? '#E8ADC0' : 'transparent',
                        border: filled ? '1px solid #D88BA4' : '1px solid rgba(196,145,165,0.4)',
                        color: filled ? '#3A1828' : '#9A6B7C' }}>{seat.number}</span>
                      <span style={{ flex: 1, minWidth: 0, overflow: 'hidden' }}>
                        <span style={{ display: 'block', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                          overflow: 'hidden', fontSize: 13,
                          color: filled ? '#3A1828' : '#9A6B7C',
                          fontStyle: filled ? 'normal' : 'italic' }}>
                          {seat.name || 'свободно'}
                        </span>
                        {seat.role && (
                          <span style={{ display: 'block', fontSize: 11, color: '#9A6B7C',
                            textOverflow: 'ellipsis', whiteSpace: 'nowrap', overflow: 'hidden',
                            fontStyle: 'italic' }}>{seat.role}</span>
                        )}
                      </span>
                    </button>
                  );
                })}
                {filteredSeats.length === 0 && (
                  <p style={{ textAlign: 'center', fontSize: 13, color: '#9A6B7C', padding: '20px 0' }}>Никого не найдено</p>
                )}
              </div>
            </div>
          </aside>

          <section className="ws-chart-order" style={{
            background: '#FAF6F1', border: '1px solid rgba(196,145,165,0.28)',
            borderRadius: 14, padding: 8, overflow: 'hidden',
            boxShadow: '0 1px 2px rgba(58,24,40,0.04)' }}>
            <SVGChart onPathRef={handlePathRef} seatPositions={seatPositions}
              jointPositions={jointPositions} guests={guests}
              selectedSeat={selectedSeat} hoveredSeat={hoveredSeat}
              onSelectSeat={setSelectedSeat} onHoverSeat={setHoveredSeat} />
            <div style={{ fontSize: 11.5, color: '#9A6B7C', textAlign: 'center',
              padding: '8px 4px 4px', letterSpacing: '0.04em' }}>
              нажми на любое место, чтобы добавить или изменить гостя
            </div>
          </section>

          <aside className="ws-edit-order">
            <div style={{ position: 'sticky', top: 90, background: 'rgba(255,255,255,0.55)',
              border: '1px solid rgba(196,145,165,0.22)', borderRadius: 14, padding: 18,
              boxShadow: '0 1px 2px rgba(58,24,40,0.04)' }}>
              {selectedSeat ? (
                <EditPanel seatNumber={selectedSeat} guest={selectedGuest}
                  guestList={guestList}
                  onUpdate={updateGuest} onClear={() => clearSeat(selectedSeat)}
                  onClose={() => setSelectedSeat(null)}
                  onPrev={() => setSelectedSeat((s) => Math.max(1, (s || 1) - 1))}
                  onNext={() => setSelectedSeat((s) => Math.min(TOTAL_SEATS, (s || 0) + 1))} />
              ) : (
                <EmptyEdit />
              )}
            </div>
          </aside>
        </div>
      </main>

      {showGuestList && (
        <GuestListModal
          guestList={guestList}
          onSave={(list) => setGuestList(list)}
          onClose={() => setShowGuestList(false)}
        />
      )}

      {showResetConfirm && (
        <Modal onClose={() => setShowResetConfirm(false)}>
          <h2 style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 24, fontWeight: 600,
            margin: '0 0 10px', color: '#3A1828' }}>Сбросить всю рассадку?</h2>
          <p style={{ fontSize: 14, color: '#5C2A3E', margin: '0 0 20px', lineHeight: 1.5 }}>
            Все имена и примечания будут удалены у всех, кто сейчас открыл сайт. Это действие нельзя отменить.
          </p>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <button className="ws-btn ws-btn-ghost" onClick={() => setShowResetConfirm(false)}>Отмена</button>
            <button className="ws-btn" onClick={resetAll} style={{ background: '#9C2E4F', color: 'white' }}>Да, сбросить</button>
          </div>
        </Modal>
      )}

      {showBulkImport && (
        <Modal onClose={() => setShowBulkImport(false)}>
          <h2 style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 24, fontWeight: 600,
            margin: '0 0 6px', color: '#3A1828' }}>Импорт рассадки</h2>
          <p style={{ fontSize: 13, color: '#7B4D63', margin: '0 0 14px', lineHeight: 1.55 }}>
            Каждая строка — один гость по порядку, начиная с места №1. Форматы:{' '}
            <code style={{ background: 'rgba(232,173,192,0.25)', padding: '1px 5px', borderRadius: 4, fontSize: 12 }}>Имя</code>{' '}
            или{' '}
            <code style={{ background: 'rgba(232,173,192,0.25)', padding: '1px 5px', borderRadius: 4, fontSize: 12 }}>Имя | кто это | примечание</code>.
            Существующие записи в этих местах будут заменены.
          </p>
          <textarea className="ws-input" value={bulkText}
            onChange={(e) => setBulkText(e.target.value)}
            placeholder={'Александр Кучма\nКсения Иванова | невеста\nИван Петров | друг жениха | веган, +1'}
            rows={11} style={{ resize: 'vertical', fontSize: 13 }} />
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 16 }}>
            <button className="ws-btn ws-btn-ghost" onClick={() => setShowBulkImport(false)}>Отмена</button>
            <button className="ws-btn ws-btn-primary" onClick={handleBulkImport} disabled={!bulkText.trim()}>Импортировать</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function SVGChart({ onPathRef, seatPositions, jointPositions, guests, selectedSeat, hoveredSeat, onSelectSeat, onHoverSeat }) {
  const activeTooltipSeat = hoveredSeat || selectedSeat;
  const activeTooltipPos = activeTooltipSeat ? seatPositions.find((p) => p.number === activeTooltipSeat) : null;
  const activeTooltipGuest = activeTooltipSeat ? guests[activeTooltipSeat] : null;
  const showSeatTooltip = !!(activeTooltipPos && activeTooltipGuest && activeTooltipGuest.name && activeTooltipGuest.name.trim());
  return (
    <div style={{ width: '100%', overflowX: 'auto' }} onMouseLeave={() => onHoverSeat(null)}>
      <svg viewBox="-40 120 1880 700"
        style={{ width: '100%', minWidth: 760, height: 'auto', display: 'block' }}
        preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="ws-tableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor="#FAD2DD" />
            <stop offset="50%" stopColor="#F4B6CB" />
            <stop offset="100%" stopColor="#ECA1BC" />
          </linearGradient>
          <filter id="ws-tableShadow" x="-3%" y="-5%" width="106%" height="115%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="3" result="o" />
            <feComponentTransfer><feFuncA type="linear" slope="0.22" /></feComponentTransfer>
            <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="ws-seatShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" />
            <feOffset dx="0" dy="1.2" result="o" />
            <feComponentTransfer><feFuncA type="linear" slope="0.2" /></feComponentTransfer>
            <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="ws-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        <path ref={onPathRef} d={PATH_D} stroke="url(#ws-tableGrad)" strokeWidth="74"
          strokeLinecap="round" fill="none" filter="url(#ws-tableShadow)" />
        <path d={PATH_D} stroke="rgba(255,255,255,0.4)" strokeWidth="1.5"
          strokeLinecap="round" fill="none" style={{ pointerEvents: 'none' }} />
        {jointPositions.map((j, i) => (
          <line key={`j-${i}`} x1={j.x1} y1={j.y1} x2={j.x2} y2={j.y2}
            stroke="rgba(140, 50, 80, 0.4)" strokeWidth="1.5" strokeLinecap="butt"
            style={{ pointerEvents: 'none' }} />
        ))}
        {seatPositions.map((pos) => {
          const guest = guests[pos.number];
          const filled = !!(guest && guest.name && guest.name.trim());
          const isSelected = selectedSeat === pos.number;
          return (
            <g key={pos.number} className="ws-seat"
              onClick={() => onSelectSeat(pos.number)}
              onMouseEnter={() => onHoverSeat(pos.number)}
              onMouseLeave={() => onHoverSeat(null)}>
              {isSelected && <circle cx={pos.x} cy={pos.y} r="26" fill="none"
                stroke="#C9A961" strokeWidth="2.5" filter="url(#ws-glow)" />}
              <circle cx={pos.x} cy={pos.y} r="20" className="ws-seat-circle" fill="#FFFFFF"
                stroke={filled ? '#3A1828' : 'rgba(154, 107, 124, 0.45)'}
                strokeWidth={filled ? 2 : 1.2} filter="url(#ws-seatShadow)" />
              {filled && <circle cx={pos.x} cy={pos.y - 12} r="3" fill="#9C2E4F" />}
              <text x={pos.x} y={pos.y + (filled ? 1 : 0)} textAnchor="middle"
                dominantBaseline="central" fontSize="16"
                fontWeight={filled ? 600 : 500}
                fill={filled ? '#3A1828' : '#7B4D63'}
                fontFamily='"Manrope", sans-serif'
                style={{ pointerEvents: 'none', userSelect: 'none' }}>
                {pos.number}
              </text>
              <circle cx={pos.x} cy={pos.y} r="28" fill="transparent" />
            </g>
          );
        })}
        {showSeatTooltip && (
          <SeatTooltip
            x={activeTooltipPos.x}
            y={activeTooltipPos.y}
            seatNumber={activeTooltipSeat}
            guest={activeTooltipGuest}
          />
        )}
      </svg>
    </div>
  );
}

function clipTooltipText(value, max = 34) {
  const text = String(value || '').replace(/\s+/g, ' ').trim();
  return text.length > max ? text.slice(0, max - 1).trimEnd() + '…' : text;
}

function SeatTooltip({ x, y, seatNumber, guest }) {
  const name = clipTooltipText(guest.name, 32);
  const role = guest.role ? clipTooltipText(guest.role, 38) : '';
  const hasNote = !!(guest.note && guest.note.trim());
  const mainText = `№ ${seatNumber} — ${name}`;
  const hasRole = !!role;

  // px-per-char estimates: main line 16px/700, role line 13px/500 italic
  const mainW = mainText.length * 9.2 + (hasNote && !hasRole ? 22 : 0);
  const roleW = hasRole ? role.length * 7.8 + (hasNote ? 22 : 0) : 0;
  const width = Math.max(140, Math.max(mainW, roleW) + 28);
  const height = hasRole ? 55 : 36;

  const tooltipX = Math.max(-20, Math.min(1880 - width, x - width / 2));
  const tooltipY = y - height - 34;
  const arrowX = x - tooltipX;

  // Position of note dot — right side, vertically centred on whichever is the last line
  const dotY = hasRole ? 40 : 22;
  const dotX = width - 14;

  return (
    <g className="ws-seat-tooltip" transform={`translate(${tooltipX}, ${tooltipY})`}>
      <rect className="ws-seat-tooltip-box" x="0" y="0" width={width} height={height} rx="10" ry="10" />
      <path d={`M ${arrowX - 7} ${height - 1} L ${arrowX} ${height + 8} L ${arrowX + 7} ${height - 1} Z`}
        fill="rgba(58, 24, 40, 0.96)" />
      <text className="ws-seat-tooltip-main" x="14" y={hasRole ? 21 : 23}>{mainText}</text>
      {hasRole && (
        <text className="ws-seat-tooltip-role" x="14" y="40">{role}</text>
      )}
      {hasNote && (
        <g>
          <circle cx={dotX} cy={dotY} r="7" fill="rgba(232,173,192,0.25)" stroke="rgba(232,173,192,0.6)" strokeWidth="1" />
          <text x={dotX} y={dotY + 1} textAnchor="middle" dominantBaseline="central"
            fontSize="9" fontWeight="700" fill="#E8ADC0" fontFamily='"Manrope", sans-serif'
            style={{ userSelect: 'none' }}>✎</text>
        </g>
      )}
    </g>
  );
}

function EditPanel({ seatNumber, guest, guestList, onUpdate, onClear, onClose, onPrev, onNext }) {
  const nameRef = useRef(null);
  useEffect(() => {
    const t = setTimeout(() => nameRef.current && nameRef.current.focus(), 60);
    return () => clearTimeout(t);
  }, [seatNumber]);

  const handleSelectGuest = (g) => {
    onUpdate(seatNumber, 'name', g.name);
    if (g.role) onUpdate(seatNumber, 'role', g.role);
  };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 46, height: 46, borderRadius: '50%', background: '#3A1828',
            color: '#FAF6F1', display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 16, fontWeight: 600 }}>{seatNumber}</div>
          <div>
            <div style={{ fontSize: 10.5, color: '#9A6B7C', textTransform: 'uppercase',
              letterSpacing: '0.1em', fontWeight: 500 }}>Место</div>
            <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 22,
              fontWeight: 600, color: '#3A1828', lineHeight: 1.05 }}>№ {seatNumber}</div>
          </div>
        </div>
        <button onClick={onClose} className="ws-btn ws-btn-ghost" style={{ padding: 6 }} title="Закрыть (Esc)">
          <Icon name="x" size={16} />
        </button>
      </div>

      <div style={{ marginBottom: 12 }}>
        <label style={{ display: 'block', fontSize: 10.5, color: '#7B4D63',
          marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600 }}>
          Имя и фамилия
        </label>
        <AutocompleteInput
          inputRef={nameRef}
          value={guest.name}
          onChange={(v) => onUpdate(seatNumber, 'name', v)}
          guestList={guestList}
          onSelectGuest={handleSelectGuest}
          placeholder={guestList.length > 0 ? 'Начните вводить или выберите из списка' : 'напр. Иван Петров'}
        />
      </div>

      <div style={{ marginBottom: 12 }}>
        <label style={{ display: 'block', fontSize: 10.5, color: '#7B4D63',
          marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600 }}>
          Кто это
        </label>
        <input className="ws-input" type="text" value={guest.role || ''}
          onChange={(e) => onUpdate(seatNumber, 'role', e.target.value)}
          placeholder="мама жениха, тётя невесты, друг…" />
      </div>

      <div style={{ marginBottom: 18 }}>
        <label style={{ display: 'block', fontSize: 10.5, color: '#7B4D63',
          marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600 }}>
          Примечание
        </label>
        <textarea className="ws-input" value={guest.note || ''}
          onChange={(e) => onUpdate(seatNumber, 'note', e.target.value)}
          placeholder="вегетарианец, +1, аллергия…"
          rows={2} style={{ resize: 'vertical', fontSize: 13 }} />
      </div>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6 }}>
        <div style={{ display: 'flex', gap: 4 }}>
          <button className="ws-btn ws-btn-ghost" onClick={onPrev} disabled={seatNumber <= 1}
            style={{ padding: 7, opacity: seatNumber <= 1 ? 0.35 : 1,
            cursor: seatNumber <= 1 ? 'not-allowed' : 'pointer' }} title="Предыдущее место (←)">
            <Icon name="left" size={15} />
          </button>
          <button className="ws-btn ws-btn-ghost" onClick={onNext} disabled={seatNumber >= TOTAL_SEATS}
            style={{ padding: 7, opacity: seatNumber >= TOTAL_SEATS ? 0.35 : 1,
            cursor: seatNumber >= TOTAL_SEATS ? 'not-allowed' : 'pointer' }} title="Следующее место (→)">
            <Icon name="right" size={15} />
          </button>
        </div>
        <button onClick={onClear} style={{ padding: '6px 10px', fontSize: 12,
          color: '#9A6B7C', background: 'transparent', border: 'none', cursor: 'pointer',
          textDecoration: 'underline', textDecorationColor: 'rgba(154,107,124,0.3)',
          textUnderlineOffset: 3, fontFamily: 'inherit' }}>Очистить</button>
      </div>
    </div>
  );
}

function EmptyEdit() {
  return (
    <div style={{ textAlign: 'center', padding: '20px 8px' }}>
      <div style={{ width: 56, height: 56, borderRadius: '50%',
        background: 'rgba(232,173,192,0.25)', display: 'inline-flex',
        alignItems: 'center', justifyContent: 'center', marginBottom: 14, color: '#7B4D63' }}>
        <Icon name="users" size={24} />
      </div>
      <h3 style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 22,
        fontWeight: 500, margin: '0 0 8px', color: '#3A1828' }}>Выбери место</h3>
      <p style={{ fontSize: 13, color: '#7B4D63', lineHeight: 1.55, margin: 0 }}>
        Нажми на нужное место на схеме или в списке, чтобы добавить или изменить гостя
      </p>
    </div>
  );
}

function Modal({ children, onClose, wide }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);
  return (
    <div className="ws-modal-bg" onClick={onClose}>
      <div className={`ws-modal${wide ? ' ws-modal-wide' : ''}`} onClick={(e) => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

const loadingEl = document.getElementById('app-loading');
if (loadingEl) loadingEl.remove();
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
